<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IngressosCopa</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div aria-label="container-esquerda" id="container-esquerda">
            <img src="assests/logo-copa.png" alt="Logo copa">
            <div aria-label="div com tipografia" id="header-text-container">
                <h1>COPA 2026</h1>
                <p>FIFA WOLRD CUP</p>
            </div>
        </div>
        <nav>
            <ul>
                <li><a aria-label="" href="">Jogos</a></li>
                <li><a aria-label="" href="">Estádios</a></li>
                <li><a aria-label="" href="">Ingressos</a></li>
                <li><a aria-label="" href="">FAQ</a></li>
                <li><a aria-label="" href="">Contato</a></li>
            </ul>
            <button class="cta-button">Comprar Ingressos</button>
        </nav>
    </header>

    <main>

        <section class="section" id="secao-tempo">
            <div id="secao-tempo-text">
                <h2>COPA DO MUNDO 2026</h2>
                <p>Viva a maior emoçao do maior evento esportivo do planeta</p>
            </div>

            <div aria-label="contador" id="contador-container">
                <div class="numero-container">
                    <p class="numero-contador">365</p>
                    <p class="texto-contador">DIAS</p>
                </div>
                <span>:</span>
                <div class="numero-container">
                    <p class="numero-contador">12</p>
                    <p class="texto-contador">HORAS</p>
                </div>
                <span>:</span>
                <div class="numero-container">
                    <p class="numero-contador">45</p>
                    <p class="texto-contador">MINUTOS</p>
                </div>
                <span>:</span>
                <div class="numero-container">
                    <p class="numero-contador">30</p>
                    <p class="texto-contador">SEGUNDOS</p>
                </div>
            </div>

            <button class="cta-button">COMPRAR INGRESSOS</button>

        </section>

        <section class="section" id="partidas-em-destaque">

        </section>

        <section class="section" id="busca-ingressos">

        </section>

        <section class="section" id="secao-estadios">

        </section>

        <section class="section" id="mapa">

        </section>

        <section class="section" id="faq">

        </section>

    </main>

    <footer></footer>

</body>

</html>
